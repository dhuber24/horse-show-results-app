services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: horseshow
    ports:
      - "5432:5432"
    volumes:
      - horseshow_pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/horseshow
    depends_on:
      - db
    volumes:
      - ./backend:/app

volumes:
  horseshow_pgdata:
